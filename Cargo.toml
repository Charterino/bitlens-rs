[package]
name = "bitlens-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
bumpalo = {version = "3.18.1", features = ["collections"]}
bytes = "1.10.1"
ctrlc = "3.4.7"
deadpool = {version = "0.12.2", features = ["rt_tokio_1"]}
deadpool-sqlite = {version ="0.11.0", features = ["rt_tokio_1"]}
hex = "0.4.3"
num = "0.4.3"
num-derive = "0.4.2"
num-traits = "0.2.19"
pprof = {version = "0.15.0", features = ["cpp", "protobuf", "protobuf-codec"]}
rand = "0.9.1"
sha2 = {version ="0.10.9", features = ["asm", "asm-aarch64"]}
tokio = {version = "1.45.1", features = ["full"]}
